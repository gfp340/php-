<html>
    <head>
        <meta charset="utf-8" />
        <title>登入範例</title>
    </head>
    <body>
        <form method=post action="2.login.php"><--action指定填完後，資料要送去哪裡，method="post"則是傳送檔案時不會顯示在網址上-->
            帳號：<input type=text name="id"><br /><--設定變數名稱-->
            密碼：<input type=password name="pwd"><p></p><--設定變數名稱，type=password讓輸入的密碼便***-->
            <input type=submit value="登入"> <input type=reset value="清除"><--type=submit 點擊它就會觸發 <form> 的送出動作，將資料給 action 的網頁，type=reset會把表單內所有輸入內容清空，恢復成預設狀態。-->
            
        </form>
    </body>
</html>
